services:

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      args:
        WWWUSER: 1000
        WWWGROUP: 1000
    container_name: ez-php-queue-app
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: mysql:8.4
    container_name: ez-php-queue-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ez_php
      MYSQL_USER: ez_php
      MYSQL_PASSWORD: secret
    ports:
      - "${DB_HOST_PORT:-3310}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ez-php-queue-redis
    ports:
      - "${REDIS_HOST_PORT:-6381}:6379"
